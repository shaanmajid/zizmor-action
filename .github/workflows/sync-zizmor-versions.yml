on:
  schedule:
    - cron: "0 * * * *" # every hour
  workflow_dispatch:

name: Sync zizmor versions

env:
  BRANCH_NAME: sync-zizmor-versions

jobs:
  sync-versions:
    name: Sync zizmor versions
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create PR branches
      pull-requests: write # to create PRs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt install -y skopeo jq

      - name: Sync zizmor versions
        run: |
          # Write to a temp file and swap, since redirecting directly to
          # support/versions would truncate it before the script reads its pins.
          tmp="$(mktemp)"
          ./support/sync-zizmor-versions.sh ./support/versions > "${tmp}"
          mv "${tmp}" ./support/versions

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          commit-message: Sync zizmor versions
          title: Sync zizmor versions
          body: |
            :robot: :warning: :robot:

            Changes were detected to the `ghcr.io/zizmorcore/zizmor` image's tags.

            This PR updates the `versions` file with new tags and digest changes.

            Please review manually before merging.

            Cross-reference: <https://ghcr.io/zizmorcore/zizmor>
          assignees: woodruffw
          draft: true
